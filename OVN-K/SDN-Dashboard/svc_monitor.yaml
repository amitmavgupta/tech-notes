apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    k8s-app: ovnkube-node
    release: kube-prometheus-stack
  name: monitor-ovnkube-node
  namespace: ovn-kubernetes
spec:
  endpoints:
    - interval: 30s
      port: ovnkube-node-metrics
      path: /metrics
      scheme: http
    - interval: 30s
      port: ovs-metrics
      path: /metrics
      scheme: http
    - interval: 30s
      port: ovn-metrics
      path: /metrics
      scheme: http
  jobLabel: k8s-app
  namespaceSelector:
    matchNames:
      - ovn-kubernetes
  selector:
    matchLabels:
      k8s-app: ovnkube-node
---
apiVersion: v1
kind: Service
metadata:
  labels:
    k8s-app: ovnkube-node
  name: ovnkube-node-prometheus-discovery
  namespace: ovn-kubernetes
spec:
  selector:
    name: ovnkube-node
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: ovnkube-node-metrics
      port: 9410
      protocol: TCP
      targetPort: 9410
    - name: ovn-metrics
      port: 9476
      protocol: TCP
      targetPort: 9476
    - name: ovs-metrics
      port: 9310
      protocol: TCP
      targetPort: 9310
---
